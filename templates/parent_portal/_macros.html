{% macro child_selector(children, selected_student, base_url) %}
{% if children|length > 1 and selected_student %}
<div class="child-selector-bar">
  <form method="GET" action="{{ base_url }}" class="child-selector-form">
    <label class="field-label">Viewing</label>
    <select name="student_id" class="form-input" onchange="this.form.submit()">
      {% for c in children %}
      <option value="{{ c.id }}" {% if selected_student.id == c.id %}selected{% endif %}>{{ c.full_name }}</option>
      {% endfor %}
    </select>
  </form>
</div>
{% endif %}
{% endmacro %}
