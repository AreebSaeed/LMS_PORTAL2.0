<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <div class="logo-icon"><i class="ti ti-school"></i></div>
      <div>
        <div class="logo-text">{{ school.name if school else 'EduCore' }}</div>
        <div class="logo-sub">Parent Portal</div>
      </div>
    </div>
  </div>
  <span class="sidebar-role-badge">Parent</span>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Overview</div>
    <a href="{{ url_for('parent_portal.dashboard') }}" class="nav-item {% if active_nav == 'dashboard' %}active{% endif %}">
      <i class="ti ti-layout-dashboard"></i> Dashboard
    </a>
    <div class="nav-section-label">My Children</div>
    <a href="{{ url_for('parent_portal.children') }}" class="nav-item {% if active_nav == 'children' %}active{% endif %}">
      <i class="ti ti-user-heart"></i> Child Profile
    </a>
    <a href="{{ url_for('parent_portal.attendance') }}" class="nav-item {% if active_nav == 'attendance' %}active{% endif %}">
      <i class="ti ti-calendar-check"></i> Attendance
    </a>
    <a href="{{ url_for('parent_portal.fees') }}" class="nav-item {% if active_nav == 'fees' %}active{% endif %}">
      <i class="ti ti-cash"></i> Fees
    </a>
    <div class="nav-section-label">Academics</div>
    <a href="{{ url_for('parent_portal.homework') }}" class="nav-item {% if active_nav == 'homework' %}active{% endif %}">
      <i class="ti ti-book-2"></i> Homework
    </a>
    <a href="{{ url_for('parent_portal.results') }}" class="nav-item {% if active_nav == 'results' %}active{% endif %}">
      <i class="ti ti-report-analytics"></i> Exam Results
    </a>
    <a href="{{ url_for('parent_portal.timetable') }}" class="nav-item {% if active_nav == 'timetable' %}active{% endif %}">
      <i class="ti ti-clock"></i> Timetable
    </a>
    <div class="nav-section-label">School</div>
    <a href="{{ url_for('parent_portal.announcements') }}" class="nav-item {% if active_nav == 'announcements' %}active{% endif %}">
      <i class="ti ti-speakerphone"></i> Announcements
    </a>
    <a href="{{ url_for('parent_portal.notifications') }}" class="nav-item {% if active_nav == 'notifications' %}active{% endif %}">
      <i class="ti ti-bell"></i> Notifications
    </a>
    <a href="{{ url_for('parent_portal.messages') }}" class="nav-item {% if active_nav == 'messages' %}active{% endif %}">
      <i class="ti ti-mail"></i> Messages
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar">{{ full_name[0] | upper }}</div>
      <div>
        <div class="user-name">{{ full_name }}</div>
        <div class="user-role">Parent</div>
      </div>
    </div>
    <a href="{{ url_for('auth.logout') }}"><button class="logout-btn">Sign Out</button></a>
  </div>
</aside>
