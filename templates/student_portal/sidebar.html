<aside class="sidebar">

    <div class="logo-sub">Student Portal</div>
  </div>
  <span class="sidebar-role-badge">Student</span>
  <nav class="sidebar-nav">

    <a href="{{ url_for('student_portal.homework') }}" class="nav-item {% if active_nav == 'homework' %}active{% endif %}">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>

      <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>

    </a>

      Fees
    </a>
    <a href="{{ url_for('student_portal.announcements') }}" class="nav-item {% if active_nav == 'announcements' %}active{% endif %}">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"/></svg>

    </a>
    <a href="{{ url_for('student_portal.notifications') }}" class="nav-item {% if active_nav == 'notifications' %}active{% endif %}">

      Messages

  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar">{{ full_name[0] | upper }}</div>
      <div><div class="user-name">{{ full_name }}</div></div>
    </div>
    <a href="{{ url_for('auth.logout') }}"><button class="logout-btn">Sign Out</button></a>
  </div>
</aside>
