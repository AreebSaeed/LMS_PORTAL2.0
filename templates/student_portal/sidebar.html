<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <div class="logo-icon"><i class="ti ti-school"></i></div>
      <div>
        <div class="logo-text">{{ school.name if school else 'EduCore' }}</div>
        <div class="logo-sub">Student Portal</div>
      </div>
    </div>
  </div>
  <span class="sidebar-role-badge">Student</span>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Overview</div>
    <a href="{{ url_for('student_portal.dashboard') }}" class="nav-item {% if active_nav == 'dashboard' %}active{% endif %}"><i class="ti ti-layout-dashboard"></i> Dashboard</a>
    <a href="{{ url_for('student_portal.profile') }}" class="nav-item {% if active_nav == 'profile' %}active{% endif %}"><i class="ti ti-user"></i> My Profile</a>
    <div class="nav-section-label">Academics</div>
    <a href="{{ url_for('student_portal.subjects') }}" class="nav-item {% if active_nav == 'subjects' %}active{% endif %}"><i class="ti ti-books"></i> Subjects</a>
    <a href="{{ url_for('student_portal.timetable') }}" class="nav-item {% if active_nav == 'timetable' %}active{% endif %}"><i class="ti ti-clock"></i> Timetable</a>
    <a href="{{ url_for('student_portal.attendance') }}" class="nav-item {% if active_nav == 'attendance' %}active{% endif %}"><i class="ti ti-calendar-check"></i> Attendance</a>
    <a href="{{ url_for('student_portal.homework') }}" class="nav-item {% if active_nav == 'homework' %}active{% endif %}"><i class="ti ti-book-2"></i> Homework</a>
    <a href="{{ url_for('student_portal.results') }}" class="nav-item {% if active_nav == 'results' %}active{% endif %}"><i class="ti ti-report-analytics"></i> Results</a>
    <a href="{{ url_for('student_portal.exams') }}" class="nav-item {% if active_nav == 'exams' %}active{% endif %}"><i class="ti ti-calendar-event"></i> Exams</a>
    <a href="{{ url_for('student_portal.materials') }}" class="nav-item {% if active_nav == 'materials' %}active{% endif %}"><i class="ti ti-file-text"></i> Materials</a>
    <div class="nav-section-label">School</div>
    <a href="{{ url_for('student_portal.fees') }}" class="nav-item {% if active_nav == 'fees' %}active{% endif %}"><i class="ti ti-cash"></i> Fees</a>
    <a href="{{ url_for('student_portal.announcements') }}" class="nav-item {% if active_nav == 'announcements' %}active{% endif %}"><i class="ti ti-speakerphone"></i> Announcements</a>
    <a href="{{ url_for('student_portal.notifications') }}" class="nav-item {% if active_nav == 'notifications' %}active{% endif %}"><i class="ti ti-bell"></i> Notifications</a>
    <a href="{{ url_for('student_portal.messages') }}" class="nav-item {% if active_nav == 'messages' %}active{% endif %}"><i class="ti ti-mail"></i> Messages</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar">{{ full_name[0] | upper }}</div>
      <div><div class="user-name">{{ full_name }}</div><div class="user-role">Student</div></div>
    </div>
    <a href="{{ url_for('auth.logout') }}"><button class="logout-btn">Sign Out</button></a>
  </div>
</aside>
