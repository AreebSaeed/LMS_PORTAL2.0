<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}EduCore — School Portal{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
  {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block body %}{% endblock %}
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% if show_announcement_bell %}
  <script>
    window.ANNOUNCEMENT_BELL = {
      unreadUrl: {{ url_for('announcements.api_unread') | tojson }},
      readUrlTemplate: {{ url_for('announcements.api_mark_read', announcement_type='__TYPE__', announcement_id='__ID__') | tojson }},
      readAllUrl: {{ url_for('announcements.api_read_all') | tojson }},
      listUrl: {{ announcement_bell_list_url | tojson }}
    };
  </script>
  <script src="{{ url_for('static', filename='js/announcement-bell.js') }}"></script>
  {% endif %}
  {% block extra_js %}{% endblock %}
</body>
</html>
